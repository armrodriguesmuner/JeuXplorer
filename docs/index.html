<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JeuXplorer — Prototype</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #fff;
    }

    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 54px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      z-index: 1000;
    }

    #header h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 1px;
      flex: 1;
    }

    #btn-toggle-zones {
      background: #2d3148;
      border: 1px solid #4a4a6a;
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: #ccc;
      font-weight: 600;
      font-size: 13px;
      transition: background 0.2s;
      flex-shrink: 0;
      white-space: nowrap;
    }

    #btn-toggle-zones:active { background: #3d4168; }

    #btn-toggle-zones.masque {
      opacity: 0.5;
    }

    #points-display {
      background: #2d3148;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
    }

    #points-value { color: #8b7cf8; }

    #map {
      position: fixed;
      top: 54px;
      left: 0; right: 0;
      bottom: 100px;
      z-index: 1;
    }

    #footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 100px;
      background: #1a1d27;
      border-top: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      z-index: 1000;
    }

    #btn-capturer {
      background: #8b7cf8;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 0;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      width: calc(100% - 32px);
      max-width: 340px;
      box-shadow: 0 4px 20px rgba(139, 124, 248, 0.4);
      transition: background 0.15s, transform 0.1s;
    }

    #btn-capturer:active {
      transform: scale(0.96);
      background: #6f5ee0;
    }

    #btn-capturer:disabled {
      background: #3a3a5c;
      box-shadow: none;
      color: #888;
    }

    #status {
      font-size: 12px;
      color: #777;
    }

    .toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #8b7cf8;
      color: white;
      padding: 12px 26px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 15px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 6px 24px rgba(139,124,248,0.5);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div id="header">
    <h1>JeuXplorer</h1>

    <!-- Bouton afficher / masquer les zones -->
    <button id="btn-toggle-zones" title="Afficher / masquer les zones">
      <span id="icon-eye">👁️</span>
      <span id="icon-eye-off" style="display:none">🚫</span>
      Zones
    </button>

    <div id="points-display">⚡ <span id="points-value">0</span> pts</div>
  </div>

  <div id="map"></div>

  <div id="footer">
    <button id="btn-capturer" disabled>Capturer</button>
    <div id="status">Chargement du GPS…</div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const RAYON_METRES = 100;
    const POINTS_PAR_CAPTURE = 10;
    const STORAGE_KEY = 'jeuxplorer_zones';

    let points = 0;
    let positionMarker = null;
    let precisionCercle = null;
    let zones = [];        // { lat, lng }
    let zonesVisibles = true;
    let currentLat = null;
    let currentLng = null;
    let carteInitialisee = false;

    // --- Carte ---
    const map = L.map('map', { zoomControl: true, attributionControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
    map.setView([48.8566, 2.3522], 13);
    map.invalidateSize();

    // Layer group pour toutes les zones capturées
    const zonesLayer = L.layerGroup().addTo(map);

    // --- Icône joueur ---
    const playerIcon = L.divIcon({
      className: '',
      html: `<div style="
        width:18px;height:18px;
        background:#8b7cf8;
        border:3px solid white;
        border-radius:50%;
        box-shadow:0 0 0 4px rgba(139,124,248,0.3),0 0 12px rgba(139,124,248,0.6);
      "></div>`,
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    // --- Toast ---
    function afficherToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // --- Points ---
    function ajouterPoints(val) {
      points += val;
      document.getElementById('points-value').textContent = points;
    }

    // --- Dessiner une zone sur la carte ---
    function dessinerZone(lat, lng) {
      L.circle([lat, lng], {
        radius: RAYON_METRES,
        color: '#8b7cf8',
        fillColor: '#8b7cf8',
        fillOpacity: 0.15,
        weight: 2
      }).addTo(zonesLayer);
    }

    // --- Sauvegarder les zones ---
    function sauvegarder() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(zones));
    }

    // --- Charger les zones sauvegardées ---
    function chargerZones() {
      const sauvegarde = localStorage.getItem(STORAGE_KEY);
      if (!sauvegarde) return;
      try {
        const data = JSON.parse(sauvegarde);
        data.forEach(z => {
          zones.push(z);
          dessinerZone(z.lat, z.lng);
          points += POINTS_PAR_CAPTURE;
        });
        document.getElementById('points-value').textContent = points;
        const nb = zones.length;
        if (nb > 0) {
          document.getElementById('status').textContent =
            `${nb} zone${nb > 1 ? 's' : ''} capturée${nb > 1 ? 's' : ''} — GPS en cours…`;
        }
      } catch(e) {}
    }

    // --- Anti-doublon ---
    function dansUneZoneExistante(lat, lng) {
      return zones.some(z => map.distance([lat, lng], [z.lat, z.lng]) < RAYON_METRES);
    }

    // --- Capturer ---
    function capturer(lat, lng) {
      if (dansUneZoneExistante(lat, lng)) {
        afficherToast('Déjà capturé ici');
        return;
      }
      dessinerZone(lat, lng);
      zones.push({ lat, lng });
      sauvegarder();
      ajouterPoints(POINTS_PAR_CAPTURE);

      const nb = zones.length;
      document.getElementById('status').textContent =
        `${nb} zone${nb > 1 ? 's' : ''} capturée${nb > 1 ? 's' : ''}`;

      afficherToast(`+${POINTS_PAR_CAPTURE} pts — Zone capturée !`);
    }

    // --- Toggle zones ---
    document.getElementById('btn-toggle-zones').addEventListener('click', function() {
      zonesVisibles = !zonesVisibles;
      if (zonesVisibles) {
        map.addLayer(zonesLayer);
        document.getElementById('icon-eye').style.display = '';
        document.getElementById('icon-eye-off').style.display = 'none';
        this.classList.remove('masque');
      } else {
        map.removeLayer(zonesLayer);
        document.getElementById('icon-eye').style.display = 'none';
        document.getElementById('icon-eye-off').style.display = '';
        this.classList.add('masque');
      }
    });

    // --- GPS ---
    if (!navigator.geolocation) {
      document.getElementById('status').textContent = 'GPS non disponible';
    } else {
      navigator.geolocation.watchPosition(
        function(pos) {
          currentLat = pos.coords.latitude;
          currentLng = pos.coords.longitude;

          if (!carteInitialisee) {
            map.setView([currentLat, currentLng], 17);
            positionMarker = L.marker([currentLat, currentLng], { icon: playerIcon }).addTo(map);
            precisionCercle = L.circle([currentLat, currentLng], {
              radius: pos.coords.accuracy,
              color: '#8b7cf8',
              fillColor: '#8b7cf8',
              fillOpacity: 0.05,
              weight: 1,
              dashArray: '4 4'
            }).addTo(map);
            carteInitialisee = true;
            document.getElementById('btn-capturer').disabled = false;
            const nb = zones.length;
            document.getElementById('status').textContent =
              nb > 0
                ? `${nb} zone${nb > 1 ? 's' : ''} capturée${nb > 1 ? 's' : ''}`
                : 'Prêt — appuyez pour capturer';
          } else {
            positionMarker.setLatLng([currentLat, currentLng]);
            precisionCercle.setLatLng([currentLat, currentLng]);
            precisionCercle.setRadius(pos.coords.accuracy);
          }
        },
        function() {
          document.getElementById('status').textContent = 'Autorisez la localisation pour jouer';
          document.getElementById('btn-capturer').disabled = true;
        },
        { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 }
      );
    }

    // --- Bouton Capturer ---
    document.getElementById('btn-capturer').addEventListener('click', function() {
      if (currentLat !== null) capturer(currentLat, currentLng);
    });

    // --- Charger les zones au démarrage ---
    chargerZones();
  </script>
</body>
</html>
